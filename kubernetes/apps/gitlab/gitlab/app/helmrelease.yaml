---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: gitlab
spec:
  interval: 24h
  timeout: 45m
  # Override cluster-apps Helm defaults: GitLab often has no prior successful release to roll back to.
  install:
    crds: CreateReplace
    remediation:
      retries: 3
    strategy:
      name: RetryOnFailure
  upgrade:
    cleanupOnFail: true
    crds: CreateReplace
    remediation:
      remediateLastFailure: false
      retries: 0
    strategy:
      name: RemediateOnFailure
  rollback:
    cleanupOnFail: true
    recreate: true
  chart:
    spec:
      chart: gitlab
      version: "9.11.0"
      sourceRef:
        kind: HelmRepository
        name: gitlab
        namespace: gitlab
  values:
    global:
      edition: ce
      hosts:
        domain: "${SECRET_DOMAIN}"
      ingress:
        enabled: false
      gatewayApi:
        enabled: true
        installEnvoy: false
        configureCertmanager: false
        gatewayRef:
          name: envoy-external
          namespace: network
      minio:
        enabled: true
    installCertmanager: false
    nginx-ingress:
      enabled: false
    prometheus:
      install: false
    gitlab-runner:
      install: true
    certmanager-issuer:
      email: "luke@parke.dev"
    postgresql:
      # NFS volumes often need Bitnami ownership fix; without it Postgres/Redis probes fail intermittently.
      volumePermissions:
        enabled: true
      primary:
        persistence:
          enabled: true
          size: 10Gi
          storageClass: nfs
    redis:
      volumePermissions:
        enabled: true
      master:
        persistence:
          enabled: true
          size: 4Gi
          storageClass: nfs
        # Append-only files on NFS commonly hit permission/MISCONF errors; RDB snapshots still persist.
        extraFlags:
          - "--appendonly"
          - "no"
    gitlab:
      webservice:
        gatewayRoute:
          sectionName: https
        minReplicas: 1
        maxReplicas: 2
      sidekiq:
        minReplicas: 1
        maxReplicas: 2
      gitaly:
        persistence:
          enabled: true
          size: 20Gi
          storageClass: nfs
      kas:
        gatewayRoute:
          sectionName: https
    registry:
      gatewayRoute:
        sectionName: https
    minio:
      gatewayRoute:
        sectionName: https
      persistence:
        storageClass: nfs
