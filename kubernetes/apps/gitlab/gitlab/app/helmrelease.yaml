---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: gitlab
spec:
  interval: 24h
  timeout: 45m
  chart:
    spec:
      chart: gitlab
      version: "9.11.0"
      sourceRef:
        kind: HelmRepository
        name: gitlab
        namespace: gitlab
  values:
    global:
      edition: ce
      hosts:
        domain: "${SECRET_DOMAIN}"
      ingress:
        enabled: false
      gatewayApi:
        enabled: true
        installEnvoy: false
        configureCertmanager: false
        gatewayRef:
          name: envoy-external
          namespace: network
      minio:
        enabled: true
    installCertmanager: false
    nginx-ingress:
      enabled: false
    prometheus:
      install: false
    gitlab-runner:
      install: false
    certmanager-issuer:
      email: "luke@parke.dev"
    postgresql:
      primary:
        persistence:
          enabled: true
          size: 10Gi
          storageClass: nfs
    redis:
      master:
        persistence:
          enabled: true
          size: 4Gi
          storageClass: nfs
    gitlab:
      webservice:
        minReplicas: 1
        maxReplicas: 2
      sidekiq:
        minReplicas: 1
        maxReplicas: 2
      gitaly:
        persistence:
          enabled: true
          size: 20Gi
          storageClass: nfs
    minio:
      persistence:
        storageClass: nfs
