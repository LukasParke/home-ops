---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: drm-exporter
spec:
  chartRef:
    kind: OCIRepository
    name: drm-exporter
  interval: 1h
  values:
    nameOverride: drm-exporter
    fullnameOverride: drm-exporter

    image:
      pullPolicy: IfNotPresent

    daemonsetAnnotations:
      reloader.stakater.com/auto: "true"

    config:
      port: 8081
      intervalSeconds: 5
      logLevel: info

    hostAccess:
      devDri: /dev/dri
      sys: /sys
      devCpu: ""
      hostNetwork: false

    resources:
      requests:
        cpu: 10m
        memory: 32Mi
      limits:
        memory: 128Mi

    monitoring:
      serviceMonitor:
        enabled: true
        interval: 30s
        scrapeTimeout: 10s
        path: /metrics
      dashboards:
        enabled: true

    tolerations:
      - operator: Exists
