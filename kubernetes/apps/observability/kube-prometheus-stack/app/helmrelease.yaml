---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kube-prometheus-stack
spec:
  interval: 1h
  chart:
    spec:
      chart: kube-prometheus-stack
      version: "69.8.2"
      sourceRef:
        kind: HelmRepository
        name: prometheus-community
        namespace: observability
  values:
    cleanPrometheusOperatorObjectNames: true
    kubeProxy:
      enabled: false
    kubeControllerManager:
      enabled: false
    kubeScheduler:
      enabled: false
    nodeExporter:
      enabled: true
    prometheus:
      prometheusSpec:
        retention: 15d
        replicas: 1
        resources:
          requests:
            cpu: 200m
            memory: 512Mi
          limits:
            memory: 2Gi
        podMonitorSelectorNilUsesHelmValues: false
        probeSelectorNilUsesHelmValues: false
        ruleSelectorNilUsesHelmValues: false
        serviceMonitorSelectorNilUsesHelmValues: false
    alertmanager:
      enabled: true
      alertmanagerSpec:
        replicas: 1
        resources:
          requests:
            cpu: 25m
            memory: 64Mi
          limits:
            memory: 256Mi
    grafana:
      enabled: true
      ingress:
        enabled: false
      sidecar:
        dashboards:
          enabled: true
        datasources:
          enabled: true
      resources:
        requests:
          cpu: 50m
          memory: 128Mi
        limits:
          memory: 512Mi
    prometheusOperator:
      resources:
        requests:
          cpu: 50m
          memory: 128Mi
        limits:
          memory: 512Mi
