---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kube-prometheus-stack
spec:
  interval: 1h
  chart:
    spec:
      chart: kube-prometheus-stack
      version: "87.10.1"
      sourceRef:
        kind: HelmRepository
        name: prometheus-community
        namespace: observability
  values:
    cleanPrometheusOperatorObjectNames: true
    kubeProxy:
      enabled: false
    kubeControllerManager:
      enabled: false
    kubeScheduler:
      enabled: false
    kubeEtcd:
      enabled: false
    nodeExporter:
      enabled: true
    prometheus:
      prometheusSpec:
        retention: 15d
        replicas: 1
        resources:
          requests:
            cpu: 200m
            memory: 512Mi
          limits:
            memory: 2Gi
        podMonitorSelectorNilUsesHelmValues: false
        probeSelectorNilUsesHelmValues: false
        ruleSelectorNilUsesHelmValues: false
        serviceMonitorSelectorNilUsesHelmValues: false
    alertmanager:
      enabled: true
      config:
        global:
          resolve_timeout: 5m
        route:
          receiver: discord
          group_by: ["alertname", "job"]
          group_wait: 30s
          group_interval: 5m
          repeat_interval: 12h
          routes:
            - match:
                alertname: Watchdog
              receiver: "null"
        receivers:
          - name: "null"
          - name: discord
            discord_configs:
              - webhook_url: "${DISCORD_WEBHOOK_URL}"
                title: '{{ template "default.title" . }}'
                message: '{{ template "default.message" . }}'
      alertmanagerSpec:
        replicas: 1
        resources:
          requests:
            cpu: 25m
            memory: 64Mi
          limits:
            memory: 256Mi
    grafana:
      enabled: true
      adminUser: "${GRAFANA_USERNAME}"
      adminPassword: "${GRAFANA_PASSWORD}"
      ingress:
        enabled: false
      sidecar:
        dashboards:
          enabled: true
        datasources:
          enabled: true
      resources:
        requests:
          cpu: 50m
          memory: 128Mi
        limits:
          memory: 512Mi
    prometheusOperator:
      resources:
        requests:
          cpu: 50m
          memory: 128Mi
        limits:
          memory: 512Mi
