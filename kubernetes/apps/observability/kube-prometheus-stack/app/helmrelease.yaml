---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kube-prometheus-stack
spec:
  interval: 1h
  install:
    crds: CreateReplace
  upgrade:
    crds: CreateReplace
  chart:
    spec:
      chart: kube-prometheus-stack
      version: "87.12.1"
      sourceRef:
        kind: HelmRepository
        name: prometheus-community
        namespace: observability
  values:
    cleanPrometheusOperatorObjectNames: true
    kubeProxy:
      enabled: false
    kubeControllerManager:
      enabled: true
      endpoints: &cp_nodes
        - 10.10.10.61
        - 10.10.10.62
        - 10.10.10.63
      service:
        enabled: true
        port: 10257
        targetPort: 10257
      serviceMonitor:
        scheme: https
        insecureSkipVerify: true
        interval: 30s
    kubeScheduler:
      enabled: true
      endpoints: *cp_nodes
      service:
        enabled: true
        port: 10259
        targetPort: 10259
      serviceMonitor:
        scheme: https
        insecureSkipVerify: true
        interval: 30s
    kubeEtcd:
      enabled: true
      endpoints: *cp_nodes
      service:
        enabled: true
        port: 2381
        targetPort: 2381
      serviceMonitor:
        scheme: http
        interval: 30s
    nodeExporter:
      enabled: true
    prometheus:
      prometheusSpec:
        retention: 15d
        replicas: 1
        resources:
          requests:
            cpu: 200m
            memory: 512Mi
          limits:
            memory: 2Gi
        podMonitorSelectorNilUsesHelmValues: false
        probeSelectorNilUsesHelmValues: false
        ruleSelectorNilUsesHelmValues: false
        serviceMonitorSelectorNilUsesHelmValues: false
    alertmanager:
      enabled: true
      config:
        global:
          resolve_timeout: 5m
        route:
          receiver: default
          group_by: ["alertname", "job"]
          group_wait: 30s
          group_interval: 5m
          repeat_interval: 12h
          routes:
            - matchers:
                - alertname="Watchdog"
              receiver: null
        receivers:
          - name: default
          - name: null
      alertmanagerSpec:
        replicas: 1
        resources:
          requests:
            cpu: 25m
            memory: 64Mi
          limits:
            memory: 256Mi
    grafana:
      enabled: true
      adminUser: "${GRAFANA_USERNAME}"
      adminPassword: "${GRAFANA_PASSWORD}"
      ingress:
        enabled: false
      sidecar:
        dashboards:
          enabled: true
        datasources:
          enabled: true
      resources:
        requests:
          cpu: 50m
          memory: 128Mi
        limits:
          memory: 512Mi
    prometheusOperator:
      resources:
        requests:
          cpu: 50m
          memory: 128Mi
        limits:
          memory: 512Mi
