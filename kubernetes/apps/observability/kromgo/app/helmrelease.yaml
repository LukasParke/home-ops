---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kromgo
spec:
  chartRef:
    kind: OCIRepository
    name: kromgo
  interval: 1h
  values:
    nameOverride: kromgo
    fullnameOverride: kromgo

    image:
      pullPolicy: IfNotPresent

    deploymentAnnotations:
      reloader.stakater.com/auto: "true"

    config:
      prometheus: http://kube-prometheus-stack-prometheus.observability.svc.cluster.local:9090
      gallery:
        enabled: true
      cache:
        enabled: true
        maxAge: 300
      badges:
        - id: cluster_birth_age
          title: Age
          query: |
            time() - min(kube_node_created)
          valueExpr: |
            duration(result).hours() < 24.0
              ? string(int(duration(result).minutes())) + "m"
              : duration(result).hours() < 720.0
                ? string(int(duration(result).hours())) + "h"
                : string(int(duration(result).hours() / 24.0)) + "d"
        - id: cluster_node_count
          title: Nodes
          query: count(kube_node_info)
          valueExpr: string(int(result)) + " nodes"
        - id: cluster_pod_count
          title: Pods
          query: sum(kube_pod_status_phase{phase="Running"})
          valueExpr: string(int(result)) + " pods"
        - id: cluster_cpu_usage
          title: CPU
          query: |
            round(
              sum(rate(container_cpu_usage_seconds_total{id="/",job="kubelet"}[5m]))
              /
              sum(machine_cpu_cores{job="node-exporter"})
              * 100, 1
            )
          valueExpr: string(int(result)) + "%"
          colorExpr: 'result <= 50.0 ? "green" : result <= 80.0 ? "orange" : "red"'
        - id: cluster_memory_usage
          title: Memory
          query: |
            round(
              sum(container_memory_working_set_bytes{id="/",job="kubelet"})
              /
              sum(machine_memory_bytes{job="node-exporter"})
              * 100, 1
            )
          valueExpr: string(int(result)) + "%"
          colorExpr: 'result <= 50.0 ? "green" : result <= 80.0 ? "orange" : "red"'

    resources:
      requests:
        cpu: 10m
        memory: 64Mi
      limits:
        memory: 128Mi

    monitoring:
      serviceMonitor:
        enabled: true
        interval: 30s
        scrapeTimeout: 10s

    httpRoute:
      enabled: true
      annotations:
        gethomepage.dev/enabled: "true"
        gethomepage.dev/name: Kromgo
        gethomepage.dev/description: Prometheus badge gallery
        gethomepage.dev/group: Observability
        gethomepage.dev/icon: mdi-chart-box-outline
        gethomepage.dev/href: "https://kromgo.${SECRET_DOMAIN}"
      parentRefs:
        - name: envoy-external
          namespace: network
          sectionName: https
      hostnames: ["kromgo.${SECRET_DOMAIN}"]
