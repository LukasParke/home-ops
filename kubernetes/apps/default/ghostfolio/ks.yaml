---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: ghostfolio
spec:
  dependsOn:
    - name: cloudnative-pg
      namespace: cnpg-system
    - name: csi-driver-nfs
      namespace: kube-system
  interval: 1h
  path: ./kubernetes/apps/default/ghostfolio/app
  postBuild:
    substituteFrom:
      - name: cluster-secrets
        kind: Secret
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  targetNamespace: default
  wait: true
