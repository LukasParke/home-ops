---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: ghostfolio-valkey
spec:
  chartRef:
    kind: OCIRepository
    name: ghostfolio
  interval: 1h
  values:
    fullnameOverride: ghostfolio-valkey
    # Ephemeral Valkey today. If you enable persistence.data with CSI nfs (ReadWriteOnce),
    # add `strategy: Recreate` under controllers.valkey — see kubernetes/docs/storage-nfs.md.
    controllers:
      valkey:
        containers:
          app:
            image:
              repository: valkey/valkey
              tag: 8-alpine
            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  tcpSocket:
                    port: &port 6379
                  periodSeconds: 30
                  timeoutSeconds: 5
                  failureThreshold: 5
              readiness:
                enabled: true
                custom: true
                spec:
                  tcpSocket:
                    port: *port
                  periodSeconds: 10
                  timeoutSeconds: 3
                  failureThreshold: 5
            resources:
              requests:
                cpu: 25m
                memory: 64Mi
              limits:
                memory: 128Mi
    service:
      app:
        ports:
          redis:
            port: *port
