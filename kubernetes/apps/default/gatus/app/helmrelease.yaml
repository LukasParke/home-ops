---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: gatus
spec:
  chartRef:
    kind: OCIRepository
    name: gatus
  interval: 1h
  values:
    fullnameOverride: gatus
    serviceAccount:
      gatus:
        enabled: true
        forceRename: gatus
    configMaps:
      gatus-config:
        enabled: true
        data:
          config.yaml: |
            storage:
              type: memory
            ui:
              title: Status
              header: Gatus
            endpoints:
              - name: SailPoint Developer Docs
                url: "https://developer.sailpoint.com"
                interval: 5m
                conditions:
                  - "[STATUS] == 200"
    controllers:
      gatus:
        strategy: RollingUpdate
        serviceAccount:
          name: gatus
        initContainers:
          copy-config:
            image:
              repository: docker.io/library/busybox
              tag: 1.37.0
            command: ["sh", "-c", "cp /tmp/gatus-config/config.yaml /config/config.yaml"]
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities: { drop: ["ALL"] }
        containers:
          app:
            image:
              repository: docker.io/twinproduction/gatus
              tag: v5.35.0
            args:
              - --config
              - /config
            probes:
              liveness: &probes
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /health
                    port: &port 8080
                  periodSeconds: 30
                  timeoutSeconds: 5
                  failureThreshold: 5
              readiness: *probes
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities: { drop: ["ALL"] }
            resources:
              requests:
                cpu: 25m
                memory: 64Mi
              limits:
                memory: 256Mi
          sidecar:
            image:
              repository: ghcr.io/home-operations/gatus-sidecar
              tag: latest
            args:
              - --auto-httproute
              - --auto-service
              - --gateway-name=envoy-external
              - --output=/config/gatus-sidecar.yaml
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities: { drop: ["ALL"] }
            resources:
              requests:
                cpu: 10m
                memory: 32Mi
              limits:
                memory: 64Mi
    defaultPodOptions:
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
        runAsGroup: 65534
        fsGroup: 65534
    service:
      app:
        ports:
          http:
            port: *port
    persistence:
      gatus-config:
        enabled: true
        type: configMap
        identifier: gatus-config
        advancedMounts:
          gatus:
            copy-config:
              - path: /tmp/gatus-config
                readOnly: true
      config:
        enabled: true
        type: emptyDir
        advancedMounts:
          gatus:
            copy-config:
              - path: /config
            app:
              - path: /config
            sidecar:
              - path: /config
    route:
      app:
        annotations:
          gethomepage.dev/enabled: "false"
        hostnames: ["gatus.${SECRET_DOMAIN}"]
        parentRefs:
          - name: envoy-external
            namespace: network
            sectionName: https
        rules:
          - backendRefs:
              - identifier: app
                port: *port
