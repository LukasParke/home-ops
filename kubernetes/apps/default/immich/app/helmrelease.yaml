---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: immich
spec:
  chartRef:
    kind: OCIRepository
    name: immich
  interval: 1h
  # Helm's normal patch path leaves the old rollingUpdate field when switching
  # existing Deployments to Recreate; force lets the live objects converge.
  upgrade:
    force: true
    serverSideApply: disabled
  values:
    immich:
      metrics:
        enabled: true
      persistence:
        library:
          existingClaim: immich-library
    valkey:
      enabled: true
      persistence:
        data:
          enabled: true
          size: 2Gi
          type: persistentVolumeClaim
          storageClass: nfs
          accessMode: ReadWriteOnce
    server:
      route:
        main:
          annotations:
            gethomepage.dev/enabled: "false"
          hostnames:
            - "immich.${SECRET_DOMAIN}"
          parentRefs:
            - name: envoy-external
              namespace: network
              sectionName: https
          rules:
            - backendRefs:
                - identifier: main
                  port: http
      controllers:
        main:
          strategy: Recreate
          containers:
            main:
              env:
                DB_URL:
                  valueFrom:
                    secretKeyRef:
                      name: immich-database-app
                      key: uri
              resources:
                requests:
                  cpu: 250m
                  memory: 1Gi
                limits:
                  memory: 4Gi
    machine-learning:
      enabled: true
      controllers:
        main:
          strategy: Recreate
      persistence:
        cache:
          enabled: true
          size: 8Gi
          type: persistentVolumeClaim
          storageClass: nfs
          accessMode: ReadWriteOnce
