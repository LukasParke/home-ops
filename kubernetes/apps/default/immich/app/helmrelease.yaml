---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: immich
spec:
  chartRef:
    kind: OCIRepository
    name: immich
  interval: 1h
  # Chart templates merge hardcoded server/machine-learning strategy RollingUpdate after user values,
  # so Recreate must be applied via post-render for RWO NFS volumes (library + ML cache).
  postRenderers:
    - kustomize:
        patches:
          - patch: |-
              apiVersion: apps/v1
              kind: Deployment
              metadata:
                name: immich-server
              spec:
                strategy:
                  type: Recreate
          - patch: |-
              apiVersion: apps/v1
              kind: Deployment
              metadata:
                name: immich-machine-learning
              spec:
                strategy:
                  type: Recreate
  values:
    immich:
      metrics:
        enabled: true
      persistence:
        library:
          existingClaim: immich-library
    valkey:
      enabled: true
      persistence:
        data:
          enabled: true
          size: 2Gi
          type: persistentVolumeClaim
          storageClass: nfs
          accessMode: ReadWriteOnce
    server:
      route:
        main:
          annotations:
            gethomepage.dev/enabled: "true"
            gethomepage.dev/name: Immich
            gethomepage.dev/description: Photo library
            gethomepage.dev/group: Photos
            gethomepage.dev/icon: immich.png
            gethomepage.dev/href: "https://immich.${SECRET_DOMAIN}"
            gethomepage.dev/widget.type: immich
            gethomepage.dev/widget.url: "https://immich.${SECRET_DOMAIN}"
          hostnames:
            - "immich.${SECRET_DOMAIN}"
          parentRefs:
            - name: envoy-external
              namespace: network
              sectionName: https
          rules:
            - backendRefs:
                - identifier: main
                  port: http
      controllers:
        main:
          containers:
            main:
              env:
                DB_URL:
                  valueFrom:
                    secretKeyRef:
                      name: immich-database-app
                      key: uri
              resources:
                requests:
                  cpu: 250m
                  memory: 512Mi
                limits:
                  memory: 2Gi
    machine-learning:
      enabled: true
      persistence:
        cache:
          enabled: true
          size: 8Gi
          type: persistentVolumeClaim
          storageClass: nfs
          accessMode: ReadWriteOnce
