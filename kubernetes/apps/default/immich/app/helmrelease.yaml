---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: immich
spec:
  chartRef:
    kind: OCIRepository
    name: immich
  interval: 1h
  # Chart templates merge hardcoded server/machine-learning strategy RollingUpdate after user values,
  # so Recreate must be applied via post-render for RWO NFS volumes (library + ML cache).
  postRenderers:
    - kustomize:
        patches:
          - patch: |-
              - op: replace
                path: /spec/strategy
                value:
                  type: Recreate
            target:
              group: apps
              version: v1
              kind: Deployment
              name: immich-server
          - patch: |-
              - op: replace
                path: /spec/strategy
                value:
                  type: Recreate
            target:
              group: apps
              version: v1
              kind: Deployment
              name: immich-machine-learning
  values:
    immich:
      metrics:
        enabled: true
      persistence:
        library:
          existingClaim: immich-library
    valkey:
      enabled: true
      persistence:
        data:
          enabled: true
          size: 2Gi
          type: persistentVolumeClaim
          storageClass: nfs
          accessMode: ReadWriteOnce
    server:
      route:
        main:
          annotations:
            gethomepage.dev/enabled: "false"
          hostnames:
            - "immich.${SECRET_DOMAIN}"
          parentRefs:
            - name: envoy-external
              namespace: network
              sectionName: https
          rules:
            - backendRefs:
                - identifier: main
                  port: http
      controllers:
        main:
          containers:
            main:
              env:
                DB_URL:
                  valueFrom:
                    secretKeyRef:
                      name: immich-database-app
                      key: uri
              resources:
                requests:
                  cpu: 250m
                  memory: 1Gi
                limits:
                  memory: 4Gi
    machine-learning:
      enabled: true
      persistence:
        cache:
          enabled: true
          size: 8Gi
          type: persistentVolumeClaim
          storageClass: nfs
          accessMode: ReadWriteOnce
