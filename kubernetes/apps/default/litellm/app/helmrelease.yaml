---
# yaml-language-server: $schema=https://raw.githubusercontent.com/fluxcd-community/flux2-schemas/main/helmrelease-helm-v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: litellm
spec:
  chartRef:
    kind: OCIRepository
    name: litellm
  interval: 1h
  values:
    nameOverride: litellm
    fullnameOverride: litellm

    deploymentAnnotations:
      reloader.stakater.com/auto: "true"

    replicaCount: 1

    # Use the database-enabled image from the chart defaults.
    # Pinning the tag is handled by Renovate on the OCIRepository tag.
    image:
      pullPolicy: IfNotPresent

    # The official LiteLLM image expects to run as root so that Prisma can
    # download/query its query-engine binaries under /.cache on startup.
    # EmptyDir volumes for /tmp and /.cache keep the container filesystem
    # writable without marking root as read-write.
    podSecurityContext:
      runAsUser: 0
      runAsGroup: 0
      runAsNonRoot: false
    securityContext:
      runAsUser: 0
      runAsGroup: 0
      runAsNonRoot: false
      allowPrivilegeEscalation: false
      readOnlyRootFilesystem: false
      capabilities:
        drop: ["ALL"]
    volumes:
      - name: tmp
        emptyDir: {}
      - name: cache
        emptyDir: {}
    volumeMounts:
      - name: tmp
        mountPath: /tmp
      - name: cache
        mountPath: /.cache

    service:
      type: ClusterIP
      port: 4000

    livenessProbe:
      path: /health/liveliness
      initialDelaySeconds: 30
      periodSeconds: 15
      timeoutSeconds: 5
      failureThreshold: 5

    readinessProbe:
      path: /health/readiness
      initialDelaySeconds: 10
      periodSeconds: 10
      timeoutSeconds: 5
      failureThreshold: 3

    startupProbe:
      path: /health/readiness
      initialDelaySeconds: 10
      periodSeconds: 10
      timeoutSeconds: 5
      failureThreshold: 30

    # Pull master key from the shared SOPS secret.
    masterkeySecretName: cluster-secrets
    masterkeySecretKey: LITELLM_MASTER_KEY

    # Inject all cluster-secrets as env vars so config.yaml can reference them
    # with os.environ/<KEY> (provider keys, UI credentials, salt, etc.).
    environmentSecrets:
      - cluster-secrets

    # Use the cloudnative-pg cluster managed in cluster-postgres.yaml.
    # Disable the chart-embedded Postgres and Redis; use cloudnative-pg and
    # add Redis caching later if needed.
    db:
      useExisting: true
      deployStandalone: false
      endpoint: litellm-database-rw.default.svc.cluster.local
      database: litellm
      url: postgresql://$(DATABASE_USERNAME):$(DATABASE_PASSWORD)@$(DATABASE_HOST)/$(DATABASE_NAME)
      secret:
        name: litellm-database-app
        usernameKey: username
        passwordKey: password
    postgresql:
      enabled: false
    redis:
      enabled: false

    # The proxy configuration is rendered as /etc/litellm/config.yaml.
    # Local inference hosts run llama-swap (OpenAI-compatible, hot-swaps
    # models on demand). Keys live in cluster-secrets.sops.yaml and are
    # injected via environmentSecrets. Cold model swaps can take 30-90s
    # (235B: minutes), hence the generous per-deployment timeouts.
    # Deduplicated 2026-07-06: each model routes to the host that benched
    # best for it (ornith-35b + gpt-oss-20b -> talos 5090; qwen3-embed ->
    # hephaestus to keep talos free for interactive load).
    proxy_config:
      # Fleet catalog — one host per model, chosen by real-task benchmarks
      # (suite: codegen, bugfix, reasoning, JSON extraction, 8k-token retrieval;
      # numbers in model_info are measured, not estimated). Vision models accept
      # OpenAI image_url content parts. Cold model swaps take 30-90s (235B:
      # minutes), hence generous timeouts. Updated 2026-07-07: VL models added,
      # qwen3.6-35b-fast retired (talos's qwen3.6-35b-a3b dominates it).
      model_list:
        # ── cerberus — Strix Halo (Ryzen AI MAX+ 395), 128GB unified, Vulkan ──
        - model_name: gpt-oss-120b
          litellm_params: &cerberus
            model: openai/gpt-oss-120b
            api_base: http://10.10.10.218:8080/v1
            api_key: os.environ/CERBERUS_LLAMASWAP_API_KEY
            timeout: 600
          model_info:
            supports_vision: false
            host: cerberus (Strix Halo, 128GB unified)
            hardware: Radeon 8060S iGPU, Vulkan
            quantization: MXFP4 (native)
            max_input_tokens: 131072
            measured_generation_tps: "51-55"
            measured_prompt_tps_8k: "755"
            ttft_8k_cold: "~12s"
            quality: "5/5 on real-task suite; reasoning_effort=high"
            notes: "Fleet quality flagship; heavy group (loads on demand, evicts coder)"
        - model_name: gemma-4-26b-a4b
          litellm_params:
            <<: *cerberus
            model: openai/gemma-4-26b-a4b
          model_info:
            supports_vision: true
            host: cerberus (Strix Halo, 128GB unified)
            hardware: Radeon 8060S iGPU, Vulkan
            quantization: QAT UD-Q4_K_XL + MTP head (~80% acceptance)
            max_input_tokens: 65536
            measured_generation_tps: "72-98"
            measured_prompt_tps_8k: "854"
            ttft_8k_cold: "~10s"
            notes: "Vision MoE (4B active); coexists with gpt-oss-120b, fast swaps"
        - model_name: qwen3-coder-next-80b
          litellm_params:
            <<: *cerberus
            model: openai/qwen3-coder-next-80b
          model_info:
            supports_vision: false
            host: cerberus (Strix Halo, 128GB unified)
            hardware: Radeon 8060S iGPU, ROCm/HIP (gfx1151)
            quantization: UD-Q4_K_XL
            max_input_tokens: 131072
            measured_generation_tps: "41-49"
            measured_prompt_tps_8k: "675"
            ttft_8k_cold: "~12s"
            notes: "Large agentic coder (HIP +33% prefill); swap lane with GLM-4.7-Flash resident"
        - model_name: glm-4.7-flash
          litellm_params:
            <<: *cerberus
            model: openai/glm-4.7-flash
          model_info:
            supports_vision: false
            host: cerberus (Strix Halo, 128GB unified)
            hardware: Radeon 8060S iGPU, Vulkan
            quantization: UD-Q4_K_XL (~18GB, ~3.6B active MoE)
            max_input_tokens: 131072
            measured_generation_tps: "~65 (Vulkan; HIP ~53, so Vulkan, 2026-07-09)"
            notes: "Fast resident chat/agent/coder lane (2026-07-09); coexists with gemma-4-26b-a4b; exclusive heavy still evicts"
        - model_name: qwen3-235b-overnight
          litellm_params:
            <<: *cerberus
            model: openai/qwen3-235b-overnight
            timeout: 1200
          model_info:
            supports_vision: false
            host: cerberus (Strix Halo, 128GB unified)
            hardware: Radeon 8060S iGPU, Vulkan
            quantization: UD-Q3_K_XL (97GB)
            max_input_tokens: 32768
            measured_generation_tps: "15-17"
            measured_prompt_tps_8k: "104-165"
            ttft_8k_cold: "~80s"
            quality: "Only perfect 5/5 sweep in the fleet"
            notes: "Batch/overnight only — evicts other cerberus models while loaded"
        # ── talos — RTX 5090 32GB, CUDA (sm_120) ──
        - model_name: qwen3.6-35b-a3b
          litellm_params: &talos
            model: openai/qwen3.6-35b-a3b
            api_base: http://10.10.10.81:8080/v1
            api_key: os.environ/TALOS_LLAMASWAP_API_KEY
            timeout: 600
          model_info:
            supports_vision: true
            host: talos (RTX 5090 32GB)
            hardware: CUDA sm_120
            quantization: UD-Q4_K_XL + MTP speculative decoding
            max_input_tokens: 196608
            measured_generation_tps: "~317 (vision spot-test)"
            notes: "Fleet's fastest Qwen3.6; vision via mmproj. Context bumped to 196608"
        - model_name: devstral-24b
          litellm_params:
            <<: *talos
            model: openai/devstral-24b
          model_info:
            supports_vision: false
            host: talos (RTX 5090 32GB)
            hardware: CUDA sm_120
            quantization: Q4_K_M (Devstral 2, 24B dense)
            max_input_tokens: 153600
            notes: "Agentic coding specialist (Mistral Devstral-Small-2). Max context tuned for 32GB VRAM"
        - model_name: ornith-35b
          litellm_params:
            <<: *talos
            model: openai/ornith-35b
          model_info:
            supports_vision: false
            host: talos (RTX 5090 32GB)
            hardware: CUDA sm_120
            quantization: APEX-I-Quality + MTP speculative decoding
            max_input_tokens: 196608
            measured_generation_tps: "291-341"
            measured_prompt_tps_8k: "9356"
            ttft_8k_cold: "~1s"
            notes: "Agentic-coding specialist (DeepReinforce Ornith 1.0). Context bumped to 196608"
        - model_name: gpt-oss-20b
          litellm_params:
            <<: *talos
            model: openai/gpt-oss-20b
          model_info:
            supports_vision: false
            host: talos (RTX 5090 32GB)
            hardware: CUDA sm_120
            quantization: MXFP4 (native)
            max_input_tokens: 131072
            measured_generation_tps: "352-390"
            measured_prompt_tps_8k: "23306"
            ttft_8k_cold: "~0.3s"
            notes: "Fastest model in the fleet; ideal for long-prompt/short-answer"
        # ── hephaestus — RTX 3080 10GB, CUDA (sm_86) ──
        - model_name: ornith-9b
          litellm_params: &hephaestus
            model: openai/ornith-9b
            api_base: http://10.10.10.65:8080/v1
            api_key: os.environ/HEPHAESTUS_LLAMASWAP_API_KEY
            timeout: 600
          model_info:
            supports_vision: false
            host: hephaestus (RTX 3080 10GB)
            hardware: CUDA sm_86
            quantization: Q5_K_M + DFlash speculative decoding (~76% acceptance)
            max_input_tokens: 16384
            measured_generation_tps: "124-160"
            measured_prompt_tps_8k: "2183"
            ttft_8k_cold: "~4s"
            notes: "Fast agentic coding; fully VRAM-resident"
        - model_name: gemma-4-12b
          litellm_params:
            <<: *hephaestus
            model: openai/gemma-4-12b
          model_info:
            supports_vision: true
            host: hephaestus (RTX 3080 10GB)
            hardware: CUDA sm_86
            quantization: QAT UD-Q4_K_XL + MTP head (~78% acceptance)
            max_input_tokens: 16384
            measured_generation_tps: "116-175"
            measured_prompt_tps_8k: "2354"
            ttft_8k_cold: "~4s"
            notes: "Fast vision model; fully VRAM-resident (added 2026-07-07)"
        - model_name: qwen3-embed
          litellm_params:
            <<: *hephaestus
            model: openai/qwen3-embed
          model_info:
            supports_vision: false
            mode: embedding
            host: hephaestus (RTX 3080 10GB)
            hardware: CUDA sm_86
            quantization: Q8_0 (0.6B)
            max_input_tokens: 8192
            measured_throughput: "33 docs/s (~250 tok each), dim 1024"
            notes: "Fleet's only embedding endpoint; always resident"
        # ── delphi — RTX 4080 SUPER 16GB, CUDA (sm_89); fills fleet gaps ──
        - model_name: phi-4
          litellm_params: &delphi
            model: openai/phi-4
            api_base: http://10.10.10.18:8080/v1
            api_key: os.environ/DELPHI_LLAMASWAP_API_KEY
            timeout: 600
          model_info:
            supports_vision: false
            host: delphi (RTX 4080 SUPER 16GB)
            hardware: CUDA sm_89
            quantization: Q5_K_M (~9.9GB)
            max_input_tokens: 32768
            measured_generation_tps: "~62"
            notes: "NEW default for delphi (2026-07-09); ~62 t/s vs mistral IQ4_XS ~53 on same GPU"
        - model_name: mistral-small-3.2-24b
          litellm_params:
            <<: *delphi
            model: openai/mistral-small-3.2-24b
          model_info:
            supports_vision: false
            host: delphi (RTX 4080 SUPER 16GB)
            hardware: CUDA sm_89
            quantization: IQ4_XS (dense, ~12GB; was Q4_K_M)
            max_input_tokens: 16384
            notes: "Mistral Small 3.2 24B quality generalist lane (not default)"
        - model_name: mistral-small-3.2-24b-vision
          litellm_params:
            <<: *delphi
            model: openai/mistral-small-3.2-24b-vision
          model_info:
            supports_vision: true
            host: delphi (RTX 4080 SUPER 16GB)
            hardware: CUDA sm_89
            quantization: Q3_K_M + mmproj F16 (~11.5GB)
            max_input_tokens: 16384
            notes: "Mistral Small 3.2 24B vision variant; use base64 data URLs for images (no HTTPS in llama-server)"
        - model_name: deepseek-r1-14b
          litellm_params:
            <<: *delphi
            model: openai/deepseek-r1-14b
          model_info:
            supports_vision: false
            host: delphi (RTX 4080 SUPER 16GB)
            hardware: CUDA sm_89
            quantization: Q5_K_M (~9.8GB)
            max_input_tokens: 32768
            notes: "DeepSeek-R1-Distill-Qwen-14B; math/logic reasoning specialist with thinking trace"
        - model_name: bge-reranker-v2-m3
          litellm_params:
            <<: *delphi
            model: openai/bge-reranker-v2-m3
          model_info:
            supports_vision: false
            mode: rerank
            host: delphi (RTX 4080 SUPER 16GB)
            hardware: CUDA sm_89
            quantization: Q8_0 (568M)
            max_input_tokens: 8192
            notes: "Fleet's only rerank endpoint; always resident with startup warmup (RAG companion to qwen3-embed)"
        # ── Virtual aliases (role-based routing) ──
        # Agents reference roles, not specific models. Hot-swap without code changes.
        - model_name: planner
          litellm_params: &planner
            model: openai/gpt-oss-120b
            api_base: http://10.10.10.218:8080/v1
            api_key: os.environ/CERBERUS_LLAMASWAP_API_KEY
            timeout: 600
          model_info:
            supports_vision: false
            host: cerberus (Strix Halo, 128GB unified)
            role: "CEO/strategist — highest intelligence"
            max_input_tokens: 131072
            notes: "Alias for gpt-oss-120b; use for planning, architecture, strategy. reasoning_effort=medium"
        - model_name: coder-fast
          litellm_params:
            model: openai/gpt-oss-20b
            api_base: http://10.10.10.81:8080/v1
            api_key: os.environ/TALOS_LLAMASWAP_API_KEY
            timeout: 600
          model_info:
            supports_vision: false
            host: talos (RTX 5090 32GB)
            role: "Fast execution — long-prompt/short-answer"
            notes: "Alias for gpt-oss-20b; ~395 t/s, fastest model in fleet"
        - model_name: coder-quality
          litellm_params:
            model: openai/ornith-35b
            api_base: http://10.10.10.81:8080/v1
            api_key: os.environ/TALOS_LLAMASWAP_API_KEY
            timeout: 600
          model_info:
            supports_vision: false
            host: talos (RTX 5090 32GB)
            role: "High-quality coding — MoE+MTP"
            notes: "Alias for ornith-35b; ~342 t/s, 196k ctx (safe), agentic coding specialist"
        - model_name: coder-agentic
          litellm_params:
            model: openai/devstral-24b
            api_base: http://10.10.10.81:8080/v1
            api_key: os.environ/TALOS_LLAMASWAP_API_KEY
            timeout: 600
          model_info:
            supports_vision: false
            host: talos (RTX 5090 32GB)
            role: "Agentic coding — multi-file edits"
            notes: "Alias for devstral-24b; Mistral Devstral 2, purpose-built for agentic coding"
        - model_name: coder-small
          litellm_params:
            model: openai/ornith-9b
            api_base: http://10.10.10.65:8080/v1
            api_key: os.environ/HEPHAESTUS_LLAMASWAP_API_KEY
            timeout: 600
          model_info:
            supports_vision: false
            host: hephaestus (RTX 3080 10GB)
            role: "Quick tasks — DFlash spec-decode"
            notes: "Alias for ornith-9b; 136 t/s, fast, fully VRAM-resident"
        - model_name: reasoning
          litellm_params:
            model: openai/deepseek-r1-14b
            api_base: http://10.10.10.18:8080/v1
            api_key: os.environ/DELPHI_LLAMASWAP_API_KEY
            timeout: 600
          model_info:
            supports_vision: false
            host: delphi (RTX 4080 SUPER 16GB)
            role: "Math/logic — thinking trace"
            notes: "Alias for deepseek-r1-14b; 48.7 t/s, reasoning specialist"
        - model_name: general
          litellm_params:
            model: openai/phi-4
            api_base: http://10.10.10.18:8080/v1
            api_key: os.environ/DELPHI_LLAMASWAP_API_KEY
            timeout: 600
          model_info:
            supports_vision: false
            host: delphi (RTX 4080 SUPER 16GB)
            role: "General chat — fast default"
            notes: "Alias for phi-4 (2026-07-09 retune); denser speed than mistral-24b on delphi"
        - model_name: cerberus-fast
          litellm_params:
            model: openai/glm-4.7-flash
            api_base: http://10.10.10.218:8080/v1
            api_key: os.environ/CERBERUS_LLAMASWAP_API_KEY
            timeout: 600
          model_info:
            supports_vision: false
            host: cerberus (Strix Halo, 128GB unified)
            role: "Fast resident MoE on cerberus — chat/agent/coder"
            notes: "Alias for glm-4.7-flash; ~3.6B active, interactive default"
        - model_name: vision
          litellm_params:
            model: openai/gemma-4-12b
            api_base: http://10.10.10.65:8080/v1
            api_key: os.environ/HEPHAESTUS_LLAMASWAP_API_KEY
            timeout: 600
          model_info:
            supports_vision: true
            host: hephaestus (RTX 3080 10GB)
            role: "Image understanding — MTP+vision"
            notes: "Alias for gemma-4-12b; 136 t/s, fast vision model"
        - model_name: overnight
          litellm_params:
            model: openai/qwen3-235b-overnight
            api_base: http://10.10.10.218:8080/v1
            api_key: os.environ/CERBERUS_LLAMASWAP_API_KEY
            timeout: 1200
          model_info:
            supports_vision: false
            host: cerberus (Strix Halo, 128GB unified)
            role: "Overnight max-quality batch"
            notes: "Alias for qwen3-235b-overnight; 17.5 t/s, 5/5 quality, runs alone (exclusive group)"
      router_settings:
        num_retries: 2
        routing_strategy: simple-shuffle
      general_settings:
        master_key: os.environ/PROXY_MASTER_KEY
        database_url: os.environ/DATABASE_URL
        proxy_batch_writing: true
        ui_username: os.environ/LITELLM_UI_USERNAME
        ui_password: os.environ/LITELLM_UI_PASSWORD
        enable_jwt_auth: false
      litellm_settings:
        callbacks:
          - prometheus
        drop_params: true
        set_verbose: false

    logLevel: INFO

    resources:
      requests:
        cpu: 100m
        memory: 512Mi
      limits:
        memory: 2Gi

    migrationJob:
      # Disabled: DB was already migrated on initial install (14d ago) and the
      # chart version (litellm-helm@1.89.3) is unchanged — only proxy_config
      # values differ. Prisma migration OOMs even at 4Gi; skip it to let the
      # values-only upgrade through. Re-enable on chart version bumps.
      enabled: false
      retries: 3
      backoffLimit: 4
      ttlSecondsAfterFinished: 120
      # The migration container also runs Prisma and needs root + writable
      # /.cache just like the main deployment.
      podSecurityContext:
        runAsUser: 0
        runAsGroup: 0
        runAsNonRoot: false
      securityContext:
        runAsUser: 0
        runAsGroup: 0
        runAsNonRoot: false
        allowPrivilegeEscalation: false
        readOnlyRootFilesystem: false
        capabilities:
          drop: ["ALL"]
      volumes:
        - name: tmp
          emptyDir: {}
        - name: cache
          emptyDir: {}
      volumeMounts:
        - name: tmp
          mountPath: /tmp
        - name: cache
          mountPath: /.cache
      resources:
        requests:
          cpu: 100m
          memory: 2Gi
        limits:
          memory: 4Gi

    serviceMonitor:
      # LiteLLM protects /metrics with the proxy master key. A custom
      # ServiceMonitor supplies it from cluster-secrets.
      enabled: false
      interval: 15s
      scrapeTimeout: 10s

    ingress:
      enabled: false

    autoscaling:
      enabled: false
