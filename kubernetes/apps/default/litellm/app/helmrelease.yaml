---
# yaml-language-server: $schema=https://raw.githubusercontent.com/fluxcd-community/flux2-schemas/main/helmrelease-helm-v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: litellm
spec:
  chartRef:
    kind: OCIRepository
    name: litellm
  interval: 1h
  values:
    nameOverride: litellm
    fullnameOverride: litellm

    deploymentAnnotations:
      reloader.stakater.com/auto: "true"

    replicaCount: 1

    # Use the database-enabled image from the chart defaults.
    # Pinning the tag is handled by Renovate on the OCIRepository tag.
    image:
      pullPolicy: IfNotPresent

    # The official LiteLLM image expects to run as root so that Prisma can
    # download/query its query-engine binaries under /.cache on startup.
    # EmptyDir volumes for /tmp and /.cache keep the container filesystem
    # writable without marking root as read-write.
    podSecurityContext:
      runAsUser: 0
      runAsGroup: 0
      runAsNonRoot: false
    securityContext:
      runAsUser: 0
      runAsGroup: 0
      runAsNonRoot: false
      allowPrivilegeEscalation: false
      readOnlyRootFilesystem: false
      capabilities:
        drop: ["ALL"]
    volumes:
      - name: tmp
        emptyDir: {}
      - name: cache
        emptyDir: {}
    volumeMounts:
      - name: tmp
        mountPath: /tmp
      - name: cache
        mountPath: /.cache

    service:
      type: ClusterIP
      port: 4000

    livenessProbe:
      path: /health/liveliness
      initialDelaySeconds: 30
      periodSeconds: 15
      timeoutSeconds: 5
      failureThreshold: 5

    readinessProbe:
      path: /health/readiness
      initialDelaySeconds: 10
      periodSeconds: 10
      timeoutSeconds: 5
      failureThreshold: 3

    startupProbe:
      path: /health/readiness
      initialDelaySeconds: 10
      periodSeconds: 10
      timeoutSeconds: 5
      failureThreshold: 30

    # Pull master key from the shared SOPS secret.
    masterkeySecretName: cluster-secrets
    masterkeySecretKey: LITELLM_MASTER_KEY

    # Inject all cluster-secrets as env vars so config.yaml can reference them
    # with os.environ/<KEY> (provider keys, UI credentials, salt, etc.).
    environmentSecrets:
      - cluster-secrets

    # Use the cloudnative-pg cluster managed in cluster-postgres.yaml.
    # Disable the chart-embedded Postgres and Redis; use cloudnative-pg and
    # add Redis caching later if needed.
    db:
      useExisting: true
      deployStandalone: false
      endpoint: litellm-database-rw.default.svc.cluster.local
      database: litellm
      url: postgresql://$(DATABASE_USERNAME):$(DATABASE_PASSWORD)@$(DATABASE_HOST)/$(DATABASE_NAME)
      secret:
        name: litellm-database-app
        usernameKey: username
        passwordKey: password
    postgresql:
      enabled: false
    redis:
      enabled: false

    # The proxy configuration is rendered as /etc/litellm/config.yaml.
    # Local inference hosts run llama-swap (OpenAI-compatible, hot-swaps
    # models on demand). Keys live in cluster-secrets.sops.yaml and are
    # injected via environmentSecrets. Cold model swaps can take 30-90s
    # (235B: minutes), hence the generous per-deployment timeouts.
    # Deduplicated 2026-07-06: each model routes to the host that benched
    # best for it (ornith-35b + gpt-oss-20b -> thor 5090; qwen3-embed ->
    # hephaestus to keep thor free for interactive load).
    proxy_config:
      model_list:
        # ── cerberus (10.10.10.218 — Strix Halo 128GB, llama-swap) ──
        - model_name: gpt-oss-120b
          litellm_params: &cerberus
            model: openai/gpt-oss-120b
            api_base: http://10.10.10.218:8080/v1
            api_key: os.environ/CERBERUS_LLAMASWAP_API_KEY
            timeout: 600
        - model_name: qwen3.6-35b
          litellm_params:
            <<: *cerberus
            model: openai/qwen3.6-35b
        - model_name: qwen3.6-35b-fast
          litellm_params:
            <<: *cerberus
            model: openai/qwen3.6-35b-fast
        - model_name: qwen3-coder-next-80b
          litellm_params:
            <<: *cerberus
            model: openai/qwen3-coder-next-80b
        - model_name: qwen3-235b-overnight
          litellm_params:
            <<: *cerberus
            model: openai/qwen3-235b-overnight
            timeout: 1200
        # ── thor (10.10.10.81 — RTX GPU, llama-swap) ──
        - model_name: qwen3.6-35b-a3b
          litellm_params: &thor
            model: openai/qwen3.6-35b-a3b
            api_base: http://10.10.10.81:8080/v1
            api_key: os.environ/THOR_LLAMASWAP_API_KEY
            timeout: 600
        - model_name: qwen3.6-27b
          litellm_params:
            <<: *thor
            model: openai/qwen3.6-27b
        - model_name: ornith-35b
          litellm_params:
            <<: *thor
            model: openai/ornith-35b
        - model_name: gpt-oss-20b
          litellm_params:
            <<: *thor
            model: openai/gpt-oss-20b
        # ── hephaestus (10.10.10.65 — RTX 3080 10GB, llama-swap on :8081) ──
        - model_name: ornith-9b
          litellm_params: &hephaestus
            model: openai/ornith-9b
            api_base: http://10.10.10.65:8081/v1
            api_key: os.environ/HEPHAESTUS_LLAMASWAP_API_KEY
            timeout: 600
        - model_name: qwen3-embed
          litellm_params:
            <<: *hephaestus
            model: openai/qwen3-embed
          model_info:
            mode: embedding
      router_settings:
        num_retries: 2
        routing_strategy: simple-shuffle
      general_settings:
        master_key: os.environ/PROXY_MASTER_KEY
        database_url: os.environ/DATABASE_URL
        proxy_batch_writing: true
        ui_username: os.environ/LITELLM_UI_USERNAME
        ui_password: os.environ/LITELLM_UI_PASSWORD
        enable_jwt_auth: false
      litellm_settings:
        drop_params: true
        set_verbose: false

    logLevel: INFO

    resources:
      requests:
        cpu: 100m
        memory: 512Mi
      limits:
        memory: 2Gi

    migrationJob:
      enabled: true
      retries: 3
      backoffLimit: 4
      ttlSecondsAfterFinished: 120
      # The migration container also runs Prisma and needs root + writable
      # /.cache just like the main deployment.
      podSecurityContext:
        runAsUser: 0
        runAsGroup: 0
        runAsNonRoot: false
      securityContext:
        runAsUser: 0
        runAsGroup: 0
        runAsNonRoot: false
        allowPrivilegeEscalation: false
        readOnlyRootFilesystem: false
        capabilities:
          drop: ["ALL"]
      volumes:
        - name: tmp
          emptyDir: {}
        - name: cache
          emptyDir: {}
      volumeMounts:
        - name: tmp
          mountPath: /tmp
        - name: cache
          mountPath: /.cache
      resources:
        requests:
          cpu: 100m
          memory: 1Gi
        limits:
          memory: 2Gi

    serviceMonitor:
      enabled: true
      interval: 15s
      scrapeTimeout: 10s

    ingress:
      enabled: false

    autoscaling:
      enabled: false
