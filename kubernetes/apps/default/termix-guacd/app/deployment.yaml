---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: termix-guacd
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: termix-guacd
  template:
    metadata:
      labels:
        app.kubernetes.io/name: termix-guacd
    spec:
      containers:
        - name: guacd
          image: docker.io/guacamole/guacd:1.5.5
          ports:
            - name: guacd
              containerPort: 4822
          resources:
            requests:
              cpu: 25m
              memory: 64Mi
            limits:
              memory: 256Mi
