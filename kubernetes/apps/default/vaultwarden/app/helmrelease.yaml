---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: vaultwarden
spec:
  chartRef:
    kind: OCIRepository
    name: vaultwarden
  interval: 1h
  values:
    controllers:
      vaultwarden:
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: docker.io/vaultwarden/server
              tag: 1.35.7-alpine
            env:
              DOMAIN: "https://vault.${SECRET_DOMAIN}"
              DATA_FOLDER: /data
              ROCKET_PORT: &port 8080
              SIGNUPS_ALLOWED: "false"
              INVITATIONS_ALLOWED: "false"
              WEBSOCKET_ENABLED: "true"
              PASSWORD_HINTS_ALLOWED: "false"
              SHOW_PASSWORD_HINT: "false"
              SENDS_ALLOWED: "false"
              IP_HEADER: X-Forwarded-For
              LOG_LEVEL: warn
              EXTENDED_LOGGING: "true"
              TZ: Etc/UTC
            probes:
              liveness: &probes
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /alive
                    port: *port
                  periodSeconds: 30
                  timeoutSeconds: 5
                  failureThreshold: 5
              readiness: *probes
              startup:
                enabled: true
                spec:
                  failureThreshold: 30
                  periodSeconds: 5
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: false
              capabilities: { drop: ["ALL"] }
            resources:
              requests:
                cpu: 50m
                memory: 128Mi
              limits:
                memory: 512Mi
    defaultPodOptions:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
    service:
      app:
        ports:
          http:
            port: *port
    route:
      app:
        annotations:
          gethomepage.dev/enabled: "true"
          gethomepage.dev/name: Vaultwarden
          gethomepage.dev/description: Password manager
          gethomepage.dev/group: Security
          gethomepage.dev/icon: vaultwarden.png
          gethomepage.dev/href: "https://vault.${SECRET_DOMAIN}"
          gethomepage.dev/widget.type: vaultwarden
          gethomepage.dev/widget.url: "https://vault.${SECRET_DOMAIN}"
        hostnames: ["vault.${SECRET_DOMAIN}"]
        parentRefs:
          - name: envoy-external
            namespace: network
            sectionName: https
        rules:
          - backendRefs:
              - identifier: app
                port: *port
    persistence:
      data:
        enabled: true
        type: persistentVolumeClaim
        storageClass: nfs
        accessMode: ReadWriteOnce
        size: 5Gi
        globalMounts:
          - path: /data
      tmp:
        type: emptyDir
