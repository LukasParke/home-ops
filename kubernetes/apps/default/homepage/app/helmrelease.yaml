---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: homepage
spec:
  chartRef:
    kind: OCIRepository
    name: homepage
  interval: 1h
  values:
    fullnameOverride: homepage
    configMaps:
      kubernetes:
        enabled: true
        data:
          kubernetes.yaml: |
            mode: cluster
            ingress: true
            gateway: true
      widgets:
        enabled: true
        data:
          widgets.yaml: |
            - kubernetes:
                cluster:
                  show: true
                  cpu: true
                  memory: true
                  showLabel: true
                  label: Cluster
                nodes:
                  show: true
                  cpu: true
                  memory: true
                  showLabel: true
      services:
        enabled: true
        data:
          services.yaml: |
            - Homelab:
                - Unraid:
                    icon: unraid.png
                    href: ${UNRAID_URL}
                    description: NAS / hypervisor
                    widget:
                      type: unraid
                      url: ${UNRAID_URL}
                      key: ${UNRAID_API_KEY}
                - qBittorrent:
                    icon: qbittorrent.png
                    href: ${QBITTORRENT_URL}
                    description: Torrent client
                    widget:
                      type: qbittorrent
                      url: ${QBITTORRENT_URL}
                      username: ${QBITTORRENT_USERNAME}
                      password: ${QBITTORRENT_PASSWORD}
                - Plex:
                    icon: plex.png
                    href: ${PLEX_URL}
                    description: Media server
                    widget:
                      type: plex
                      url: ${PLEX_URL}
                      key: ${PLEX_TOKEN}
                - Cloudflare Tunnel:
                    icon: cloudflare.png
                    href: https://one.dash.cloudflare.com/${CLOUDFLARE_ACCOUNT_ID}
                    description: Tunnel status
                    widget:
                      type: cloudflared
                      accountid: ${CLOUDFLARE_ACCOUNT_ID}
                      tunnelid: ${CLOUDFLARE_TUNNEL_ID}
                      key: ${CLOUDFLARE_TUNNEL_API_TOKEN}
            - Media:
                - Prowlarr:
                    icon: prowlarr.png
                    href: https://prowlarr.${SECRET_DOMAIN}
                    description: Indexer manager
                    widget:
                      type: prowlarr
                      url: https://prowlarr.${SECRET_DOMAIN}
                      key: ${PROWLARR__AUTH__APIKEY}
                - Radarr:
                    icon: radarr.png
                    href: https://radarr.${SECRET_DOMAIN}
                    description: Movies
                    widget:
                      type: radarr
                      url: https://radarr.${SECRET_DOMAIN}
                      key: ${RADARR__AUTH__APIKEY}
                - Sonarr:
                    icon: sonarr.png
                    href: https://sonarr.${SECRET_DOMAIN}
                    description: TV
                    widget:
                      type: sonarr
                      url: https://sonarr.${SECRET_DOMAIN}
                      key: ${SONARR__AUTH__APIKEY}
                - Lidarr:
                    icon: lidarr.png
                    href: https://lidarr.${SECRET_DOMAIN}
                    description: Music
                    widget:
                      type: lidarr
                      url: https://lidarr.${SECRET_DOMAIN}
                      key: ${LIDARR__AUTH__APIKEY}
                - Tautulli:
                    icon: tautulli.png
                    href: https://tautulli.${SECRET_DOMAIN}
                    description: Plex analytics
                    widget:
                      type: tautulli
                      url: https://tautulli.${SECRET_DOMAIN}
                      key: ${TAUTULLI_API_KEY}
                - Immich:
                    icon: immich.png
                    href: https://immich.${SECRET_DOMAIN}
                    description: Photo library
                    widget:
                      type: immich
                      url: https://immich.${SECRET_DOMAIN}
                      key: ${IMMICH_API_KEY}
                      version: 2
            - Apps:
                - Ghostfolio:
                    icon: ghostfolio.png
                    href: https://ghostfolio.${SECRET_DOMAIN}
                    description: Portfolio tracker
                    widget:
                      type: ghostfolio
                      url: https://ghostfolio.${SECRET_DOMAIN}
                      key: ${GHOSTFOLIO_WIDGET_BEARER_TOKEN}
                - Gatus:
                    icon: mdi-heart-pulse
                    href: https://gatus.${SECRET_DOMAIN}
                    description: Status checks
                    widget:
                      type: gatus
                      url: https://gatus.${SECRET_DOMAIN}
                - Grafana:
                    icon: grafana.png
                    href: https://grafana.${SECRET_DOMAIN}
                    description: Metrics and dashboards
                    widget:
                      type: grafana
                      version: 2
                      url: https://grafana.${SECRET_DOMAIN}
                      username: ${GRAFANA_USERNAME}
                      password: ${GRAFANA_PASSWORD}
            - Git:
                - Forgejo:
                    icon: forgejo.png
                    href: https://forgejo.${SECRET_DOMAIN}
                    description: Git hosting
    controllers:
      homepage:
        strategy: Recreate
        serviceAccount:
          name: homepage
        containers:
          app:
            image:
              repository: ghcr.io/gethomepage/homepage
              tag: v1.12.3
            env:
              HOMEPAGE_ALLOWED_HOSTS: "homepage.${SECRET_DOMAIN}"
            probes:
              liveness: &probes
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /
                    port: &port 3000
                  initialDelaySeconds: 10
                  periodSeconds: 10
              readiness: *probes
            resources:
              requests:
                cpu: 25m
                memory: 128Mi
              limits:
                memory: 512Mi
    service:
      app:
        ports:
          http:
            port: *port
    persistence:
      config:
        enabled: true
        type: persistentVolumeClaim
        storageClass: nfs
        accessMode: ReadWriteOnce
        size: 5Gi
        globalMounts:
          - path: /app/config
      kubernetes-config:
        enabled: true
        type: configMap
        identifier: kubernetes
        advancedMounts:
          homepage:
            app:
              - path: /app/config/kubernetes.yaml
                subPath: kubernetes.yaml
                readOnly: true
      widgets-config:
        enabled: true
        type: configMap
        identifier: widgets
        advancedMounts:
          homepage:
            app:
              - path: /app/config/widgets.yaml
                subPath: widgets.yaml
                readOnly: true
      services-config:
        enabled: true
        type: configMap
        identifier: services
        advancedMounts:
          homepage:
            app:
              - path: /app/config/services.yaml
                subPath: services.yaml
                readOnly: true
    route:
      app:
        annotations:
          gethomepage.dev/enabled: "true"
          gethomepage.dev/name: Homepage
          gethomepage.dev/description: Application dashboard
          gethomepage.dev/group: Cluster
          gethomepage.dev/icon: homepage.png
          gethomepage.dev/href: "https://homepage.${SECRET_DOMAIN}"
        hostnames: ["homepage.${SECRET_DOMAIN}"]
        parentRefs:
          - name: envoy-external
            namespace: network
            sectionName: https
        rules:
          - backendRefs:
              - identifier: app
                port: *port
