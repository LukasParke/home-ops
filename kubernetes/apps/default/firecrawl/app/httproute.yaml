---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: firecrawl
  annotations:
    gethomepage.dev/enabled: "false"
spec:
  hostnames: ["firecrawl.${SECRET_DOMAIN}"]
  parentRefs:
    - name: envoy-external
      namespace: network
      sectionName: https
  rules:
    - backendRefs:
        - name: firecrawl-api
          port: 3002
