---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: blog
  annotations:
    gethomepage.dev/enabled: "true"
    gethomepage.dev/name: Blog
    gethomepage.dev/description: parke.dev blog
    gethomepage.dev/group: Projects
    gethomepage.dev/icon: si-astro
    gethomepage.dev/href: "https://blog.${SECRET_DOMAIN}"
spec:
  hostnames: ["blog.${SECRET_DOMAIN}"]
  parentRefs:
    - name: envoy-external
      namespace: network
      sectionName: https
  rules:
    - backendRefs:
        - name: blog
          port: 80
