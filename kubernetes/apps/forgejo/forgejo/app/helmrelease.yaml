---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: forgejo
spec:
  interval: 1h
  timeout: 30m
  chartRef:
    kind: OCIRepository
    name: forgejo
  values:
    global:
      storageClass: nfs
    persistence:
      enabled: true
      storageClass: nfs
      size: 10Gi
      accessModes:
        - ReadWriteOnce
    httpRoute:
      enabled: true
      terminate: true
      parentRefs:
        - name: envoy-external
          namespace: network
          sectionName: https
      hostnames:
        - "forgejo.${SECRET_DOMAIN}"
      port: 3000
    gitea:
      admin:
        # Substituted from cluster-secrets (Flux postBuild); add keys before first deploy.
        username: "${FORGEJO_ADMIN_USERNAME}"
        password: "${FORGEJO_ADMIN_PASSWORD}"
        email: "${FORGEJO_ADMIN_EMAIL}"
        passwordMode: keepUpdated
      additionalConfigFromEnvs:
        - name: FORGEJO__DATABASE__PASSWD
          valueFrom:
            secretKeyRef:
              name: forgejo-database-app
              key: password
      config:
        server:
          DOMAIN: "forgejo.${SECRET_DOMAIN}"
          ROOT_URL: "https://forgejo.${SECRET_DOMAIN}/"
          SSH_DOMAIN: "forgejo.${SECRET_DOMAIN}"
        database:
          DB_TYPE: postgres
          HOST: forgejo-database-rw.forgejo.svc.cluster.local:5432
          NAME: forgejo
          USER: forgejo
          SSL_MODE: require
