---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: tuppr
spec:
  chartRef:
    kind: OCIRepository
    name: tuppr
  interval: 1h
  values:
    nameOverride: tuppr
    fullnameOverride: tuppr

    image:
      pullPolicy: IfNotPresent

    podAnnotations:
      reloader.stakater.com/auto: "true"

    podSecurityContext:
      runAsNonRoot: true
      runAsUser: 65532
      fsGroup: 65532

    securityContext:
      allowPrivilegeEscalation: false
      capabilities:
        drop:
          - ALL
      readOnlyRootFilesystem: true
      runAsNonRoot: true
      runAsUser: 65532

    resources:
      requests:
        cpu: 10m
        memory: 64Mi
      limits:
        memory: 128Mi

    controller:
      logLevel: info
      leaderElection:
        enabled: true
      metrics:
        enabled: true
        port: 8080
        secure: false
      health:
        port: 8081

    webhook:
      enabled: true
      port: 9443

    rbac:
      create: true

    monitoring:
      serviceMonitor:
        enabled: true
        interval: 30s
        scrapeTimeout: 10s
        path: /metrics

    tolerations:
      - key: CriticalAddonsOnly
        operator: Exists
      - key: node-role.kubernetes.io/control-plane
        operator: Exists
        effect: NoSchedule
