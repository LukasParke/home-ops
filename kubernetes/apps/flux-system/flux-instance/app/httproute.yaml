---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: github-webhook
  annotations:
    gethomepage.dev/enabled: "true"
    gethomepage.dev/name: Flux webhooks
    gethomepage.dev/description: Git webhook receiver for Flux (protected)
    gethomepage.dev/group: GitOps
    gethomepage.dev/icon: flux.png
    gethomepage.dev/href: "https://flux-webhook.${SECRET_DOMAIN}"
spec:
  hostnames: ["flux-webhook.${SECRET_DOMAIN}"]
  parentRefs:
    - name: envoy-external
      namespace: network
      sectionName: https
  rules:
    - backendRefs:
        - name: webhook-receiver
          namespace: flux-system
          port: 80
      matches:
        - path:
            type: PathPrefix
            value: /hook/
