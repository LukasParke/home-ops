# Reference only: not applied. Add or update these keys under `stringData` in
# `cluster-secrets.sops.yaml` (use: sops edit kubernetes/components/sops/cluster-secrets.sops.yaml).
#
# Used by default-namespace apps (Helm valueFrom.secretKeyRef name: cluster-secrets):
#   *arr:  RADARR__AUTH__APIKEY, SONARR__AUTH__APIKEY, LIDARR__AUTH__APIKEY, PROWLARR__AUTH__APIKEY
#
# Network and other apps still use their own *-secret SOPS files; you can move those here
# the same way (one key per value) and point HelmReleases at cluster-secrets.
---
stringData:
  SECRET_DOMAIN: your.domain.tld
  MEDIA_NFS_SERVER: "10.0.0.0"
  MEDIA_NFS_PATH: /export/media
  RADARR__AUTH__APIKEY: your-radarr-key
  SONARR__AUTH__APIKEY: your-sonarr-key
  LIDARR__AUTH__APIKEY: your-lidarr-key
  PROWLARR__AUTH__APIKEY: your-prowlarr-key
