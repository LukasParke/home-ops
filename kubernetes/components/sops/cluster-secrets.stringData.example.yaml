# Reference only: not applied. Add or update these keys under `stringData` in
# `cluster-secrets.sops.yaml` (use: sops edit kubernetes/components/sops/cluster-secrets.sops.yaml).
#
# Used by default-namespace apps (Helm valueFrom.secretKeyRef name: cluster-secrets):
#   *arr:  RADARR__AUTH__APIKEY, SONARR__AUTH__APIKEY, LIDARR__AUTH__APIKEY, PROWLARR__AUTH__APIKEY
#
# Homepage services.yaml (Flux substituteFrom on ks homepage):
#   Homelab widgets: UNRAID_URL, UNRAID_API_KEY, QBITTORRENT_*, PLEX_URL, PLEX_TOKEN,
#   CLOUDFLARE_ACCOUNT_ID, CLOUDFLARE_TUNNEL_ID, CLOUDFLARE_TUNNEL_API_TOKEN
#   Cluster widgets: TAUTULLI_API_KEY, GHOSTFOLIO_WIDGET_BEARER_TOKEN
#
# Ghostfolio app (Helm env valueFrom cluster-secrets):
#   GHOSTFOLIO_ACCESS_TOKEN_SECRET, GHOSTFOLIO_JWT_SECRET_KEY
#
# Network and other apps still use their own *-secret SOPS files; you can move those here
# the same way (one key per value) and point HelmReleases at cluster-secrets.
---
stringData:
  SECRET_DOMAIN: your.domain.tld
  MEDIA_NFS_SERVER: "10.0.0.0"
  MEDIA_NFS_PATH: /export/media
  RADARR__AUTH__APIKEY: your-radarr-key
  SONARR__AUTH__APIKEY: your-sonarr-key
  LIDARR__AUTH__APIKEY: your-lidarr-key
  PROWLARR__AUTH__APIKEY: your-prowlarr-key
  UNRAID_URL: https://tower.lan
  UNRAID_API_KEY: your-unraid-admin-api-key
  QBITTORRENT_URL: http://qbittorrent.lan:8080
  QBITTORRENT_USERNAME: admin
  QBITTORRENT_PASSWORD: your-qbit-password
  PLEX_URL: https://plex.lan:32400
  PLEX_TOKEN: your-plex-token
  CLOUDFLARE_ACCOUNT_ID: "0123456789abcdef0123456789abcdef"
  CLOUDFLARE_TUNNEL_ID: "01234567-89ab-cdef-0123-456789abcdef"
  CLOUDFLARE_TUNNEL_API_TOKEN: your-cloudflare-api-token
  TAUTULLI_API_KEY: your-tautulli-api-key
  GHOSTFOLIO_WIDGET_BEARER_TOKEN: your-ghostfolio-homepage-widget-token
  GHOSTFOLIO_ACCESS_TOKEN_SECRET: long-random-string-for-ghostfolio-app
  GHOSTFOLIO_JWT_SECRET_KEY: another-long-random-string-for-ghostfolio-app
